name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: packages/vrdev
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,all]"

      - name: Lint with ruff
        working-directory: packages/vrdev
        run: |
          ruff check src/ tests/ --output-format=github

      - name: Run tests
        working-directory: packages/vrdev
        run: |
          pip install pytest-cov>=5.0
          python -m pytest --tb=short -q --cov=vrdev --cov-report=term-missing --cov-fail-under=85

      - name: Type-check marker exists
        working-directory: packages/vrdev
        run: |
          test -f src/vrdev/py.typed

  test-api:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install vrdev
        working-directory: packages/vrdev
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,all]"

      - name: Install vr-api
        working-directory: packages/vr-api
        run: |
          pip install -e ".[dev]"

      - name: Lint with ruff
        working-directory: packages/vr-api
        run: |
          pip install ruff>=0.4
          ruff check src/ tests/ --output-format=github

      - name: Run tests
        working-directory: packages/vr-api
        run: |
          python -m pytest --tb=short -q --cov=vr_api --cov-report=term-missing --cov-fail-under=85

  integration-test:
    runs-on: ubuntu-latest
    needs: [test, test-api]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install vrdev
        working-directory: packages/vrdev
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,all]"

      - name: Install vr-api
        working-directory: packages/vr-api
        run: |
          pip install -e ".[dev]"

      - name: Run integration tests
        working-directory: packages/vr-api
        run: |
          python -m pytest tests/integration/ -m integration --tb=short -q -v

      - name: Upload benchmark artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: packages/vr-api/benchmark_results.json
          if-no-files-found: ignore

  validate-registry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install vrdev
        working-directory: packages/vrdev
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,all]"

      - name: Validate registry specs
        run: python scripts/validate_registry.py
